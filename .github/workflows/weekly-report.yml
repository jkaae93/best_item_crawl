name: Generate Weekly Report

on:
  schedule:
    # 매주 월요일 오전 8시 (KST = UTC 23시, 일요일)
    - cron: '0 23 * * 0'
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      target_year:
        description: '대상 연도 (예: 2025)'
        required: false
      target_month:
        description: '대상 월 (예: 10)'
        required: false
      target_week:
        description: '대상 주차 (예: 5)'
        required: false

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 가져오기

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Determine target week
        id: calc
        env:
          TZ: Asia/Seoul
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ -n "${{ github.event.inputs.target_year }}" ] && \
             [ -n "${{ github.event.inputs.target_month }}" ] && \
             [ -n "${{ github.event.inputs.target_week }}" ]; then
            year="${{ github.event.inputs.target_year }}"
            month_input="${{ github.event.inputs.target_month }}"
            week_input="${{ github.event.inputs.target_week }}"
          else
            year=$(date '+%Y')
            month_input=$(date '+%m')
            day=$(date '+%d')
            week_input=$(( (10#$day - 1) / 7 + 1 ))
          fi

          month_num=$((10#$month_input))
          month=$(printf '%02d' "${month_num}")
          week_num=$((10#$week_input))

          echo "year=${year}" >> $GITHUB_OUTPUT
          echo "month=${month}" >> $GITHUB_OUTPUT
          echo "month_num=${month_num}" >> $GITHUB_OUTPUT
          echo "week_num=${week_num}" >> $GITHUB_OUTPUT
          echo "대상 기간: ${year}년 ${month}월 ${week_num}주차"

      - name: Generate weekly report
        id: generate
        env:
          TZ: Asia/Seoul
        run: |
          year="${{ steps.calc.outputs.year }}"
          month="${{ steps.calc.outputs.month }}"
          month_num="${{ steps.calc.outputs.month_num }}"
          week_num="${{ steps.calc.outputs.week_num }}"

          export PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}"
          python3 scripts/generate_reports.py weekly ${year} ${month_num} ${week_num}

          report_file="output/${year}/${month}/${year}년_${month}월_${week_num}주차_통계.pdf"

          if [ -f "$report_file" ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
            echo "report_file=${report_file}" >> $GITHUB_OUTPUT
            echo "report_name=$(basename "$report_file")" >> $GITHUB_OUTPUT
            echo "✓ 주간 리포트 생성 완료: $report_file"
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ 주간 리포트 생성 실패 (데이터 부족 가능성)"
          fi

      - name: Display report summary
        if: steps.generate.outputs.report_exists == 'true'
        env:
          TZ: Asia/Seoul
        run: |
          report_file="${{ steps.generate.outputs.report_file }}"

          echo "=== 주간 리포트 요약 ==="
          if [ -f "$report_file" ]; then
            ls -lh "$report_file"
          else
            echo "⚠️ 리포트 파일이 없습니다: $report_file"
          fi

      - name: Commit and push weekly report
        if: steps.generate.outputs.report_exists == 'true'
        env:
          TZ: Asia/Seoul
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          year="${{ steps.calc.outputs.year }}"
          month="${{ steps.calc.outputs.month }}"
          week_num="${{ steps.calc.outputs.week_num }}"

          git fetch origin master
          git rebase origin/master || git merge origin/master -m "Merge remote changes"

          git add output/${year}/${month}/*주차_통계.pdf
          git add output/${year}/${month}/*주차_통계.csv

          if git diff --staged --quiet; then
            echo "변경사항이 없습니다."
          else
            kst_date=$(date '+%Y년 %m월 %d일')

            commit_msg="📊 주간 리포트 생성: ${year}년 ${month}월 ${week_num}주차

            - 분석 기간: 지난 주 월요일 ~ 일요일
            - 생성 일시: ${kst_date}
            - 자동 생성: GitHub Actions (Weekly Report)"

            git commit -m "$commit_msg"

            for i in {1..3}; do
              if git push origin master; then
                echo "✓ 주간 리포트 커밋 완료"
                break
              else
                echo "⚠️ Push 실패, 재시도 $i/3"
                git fetch origin master
                git rebase origin/master || git merge origin/master -m "Merge during retry"
                sleep 3
              fi
            done
          fi

      - name: Create summary
        if: steps.generate.outputs.report_exists == 'true'
        env:
          TZ: Asia/Seoul
        run: |
          report_file="${{ steps.generate.outputs.report_file }}"
          report_name="${{ steps.generate.outputs.report_name }}"
          year="${{ steps.calc.outputs.year }}"
          month="${{ steps.calc.outputs.month }}"
          week_num="${{ steps.calc.outputs.week_num }}"
          report_url="https://github.com/${GITHUB_REPOSITORY}/blob/master/${report_file}"

          echo "# 📊 HACIE 주간 리포트 생성 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**리포트 기간:** ${year}년 ${month}월 ${week_num}주차" >> $GITHUB_STEP_SUMMARY
          echo "**생성 시간:** $(date '+%Y-%m-%d %H:%M:%S') KST" >> $GITHUB_STEP_SUMMARY
          echo "**리포트 파일:** [${report_name}](${report_url})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack notification
        if: steps.generate.outputs.report_exists == 'true'
        env:
          TZ: Asia/Seoul
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          year="${{ steps.calc.outputs.year }}"
          month="${{ steps.calc.outputs.month }}"
          week_num="${{ steps.calc.outputs.week_num }}"
          report_file="${{ steps.generate.outputs.report_file }}"
          report_name="${{ steps.generate.outputs.report_name }}"
          report_url="https://github.com/${GITHUB_REPOSITORY}/blob/master/${report_file}"
          kst_time=$(date '+%Y년 %m월 %d일 %H:%M:%S')

          payload=$(REPORT_URL="$report_url" REPORT_NAME="$report_name" YEAR="$year" MONTH="$month" WEEK_NUM="$week_num" KST_TIME="$kst_time" python3 - <<'PY'
          import json
          import os
          import time

          payload = {
              "text": "✅ HACIE 주간 리포트 생성 완료",
              "attachments": [
                  {
                      "color": "good",
                      "title": f"📊 {os.environ['YEAR']}년 {os.environ['MONTH']}월 {os.environ['WEEK_NUM']}주차 리포트",
                      "title_link": os.environ["REPORT_URL"],
                      "mrkdwn_in": ["fields"],
                      "fields": [
                          {
                              "title": "리포트 파일",
                              "value": f"<{os.environ['REPORT_URL']}|{os.environ['REPORT_NAME']}>",
                              "short": False,
                          },
                          {
                              "title": "생성 시각",
                              "value": f"{os.environ['KST_TIME']} KST",
                              "short": False,
                          },
                      ],
                      "footer": "GitHub Actions",
                      "footer_icon": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
                      "ts": int(time.time()),
                  }
              ],
          }

          print(json.dumps(payload, ensure_ascii=False))
          PY
          )

          response=$(curl -X POST \
            -H 'Content-type: application/json' \
            --data "$payload" \
            -w "\n%{http_code}" \
            -s \
            "$SLACK_WEBHOOK_URL")

          http_code=$(echo "$response" | tail -n 1)
          if [ "$http_code" = "200" ]; then
            echo "✅ Slack 알림 전송 성공!"
          else
            echo "⚠️ Slack 알림 전송 실패 (HTTP ${http_code})"
            echo "Response: $(echo "$response" | head -n -1)"
          fi

      - name: Upload report as artifact
        if: steps.generate.outputs.report_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ steps.calc.outputs.year }}-${{ steps.calc.outputs.month }}-week${{ steps.calc.outputs.week_num }}
          path: ${{ steps.generate.outputs.report_file }}
          retention-days: 365
